name: RedLedger DevSecOps Pipeline

on:
  push:
    branches: [ main, 'phase/**', 'vuln/**' ]
  pull_request:
    branches: [ main, 'phase/**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: gradle

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Run Tests
        run: ./gradlew test --no-daemon

  sca-snyk:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: gradle

      - name: Run Snyk SCA Scan
        uses: snyk/actions/gradle-9-jdk24@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium --sarif-file-output=snyk.sarif

      - name: Upload Snyk results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif

      - name: Save Snyk JSON report as artifact
        run: snyk test --json > docs/evidence/snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk report artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: docs/evidence/snyk-report.json

  sast-semgrep:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Semgrep SAST Scan
        # TODO: Configure Semgrep and enable scan
        # uses: semgrep/semgrep-action@v1
        # with:
        #   config: p/java p/owasp-top-ten
        run: echo "Semgrep SAST scan placeholder - configure to enable"

