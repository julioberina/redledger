name: RedLedger DevSecOps Pipeline

on:
  push:
    branches: [ main, 'phase/**', 'vuln/**' ]
  pull_request:
    branches: [ main, 'phase/**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: gradle

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Run Tests
        run: ./gradlew test --no-daemon

  sca-snyk:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'oracle'
          cache: gradle

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Run Snyk SCA Scan
        run: |
          mkdir -p docs/evidence
          snyk test \
            --severity-threshold=medium \
            --sarif-file-output=snyk.sarif \
            --json-file-output=docs/evidence/snyk-report.json \
            || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk.sarif

      - name: Save Snyk JSON report as artifact
        run: snyk test --json > docs/evidence/snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk report artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: snyk-report
          path: docs/evidence/snyk-report.json

  sast-semgrep:
    runs-on: ubuntu-latest
    needs: build
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    continue-on-error: true
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Semgrep SAST Scan
        run: |
          semgrep scan \
            --config p/default \
            --sarif \
            --output semgrep.sarif \
            --metrics=off \
            .
          semgrep scan \
            --config p/default \
            --json \
            -o docs/evidence/semgrep-report.json \
            --metrics=off \
            .

      - name: Upload Semgrep results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

      - name: Upload Semgrep JSON report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: semgrep-report
          path: docs/evidence/semgrep-report.json

