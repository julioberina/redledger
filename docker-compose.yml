version: '3.8'

services:
  redledger:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redledger-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - JWT_SECRET=secret_padding_to_meet_256bit_min
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
