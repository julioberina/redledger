# ===========================================
# RedLedger Application Configuration
# ===========================================

# Application
spring.application.name=redledger
server.port=8080
# VULN: [A5] - (3.A5.1) Stack traces and full error details exposed in API responses.
# Verbose error output leaks internal class names, file paths, SQL queries, and framework
# version information to the client - aids attacker reconnaissance.
spring.web.error.include-stacktrace=always
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-exception=true

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:redledgerdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# Initialize data after Hibernate schema creation
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# JWT Configuration
# VULN: [A2] ? Weak, guessable JWT secret; meets minimum byte length to avoid WeakKeyException
# but is trivially brute-forceable. Enables token forgery via dictionary attack.
jwt.secret=secret_padding_to_meet_256bit_min
# VULN: [A4] - (3.A4.3) JWT expiry set to 24 hours. Long-lived tokens increase the window
# of opportunity for token theft and replay attacks. No refresh-token rotation or revocation
# mechanism exists - a stolen token remains valid for the full 24-hour window.
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.redledger=DEBUG
logging.level.org.springframework.security=DEBUG
